name: "Build Strava Collection"
description: "Generates a Strava collection from given activity IDs"
inputs:
  activity_ids:
    description: "Space-separated Strava activity IDs"
    required: true
  output_dir:
    description: "Directory to save the collection"
    required: true
  collection_name:
    description: "Name of the Strava collection"
    required: true
runs:
  using: "composite"
  steps:
    - name: Run strava-collections
      shell: bash
      run: |
        echo "Generating collection: ${{ inputs.collection_name }}"
        strava-collections ${{ inputs.activity_ids }} -o ${{ inputs.output_dir }} -c "${{ inputs.collection_name }}"
