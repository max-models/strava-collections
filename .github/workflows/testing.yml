name: Generate Strava Collections

on:
  push:
    branches: [main, devel]
  pull_request:
    branches: [main, devel]

env:
  STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
  STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
  STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
  MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
  STRAVA_CACHE_DIR: temporary-strava-activities

jobs:
  build-collections:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ssh-key: ${{ secrets.STRAVA_ACTIVITIES_DEPLOY_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install strava-collections
        run: |
          pip install --upgrade pip
          pip install ".[dev,docs]"

      - name: Build all collections
        uses: ./.github/actions/build-all-collections

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: "npm"
          cache-dependency-path: docs/astro/package-lock.json

      - name: Install Astro dependencies
        run: cd docs/astro && npm ci

      - name: Build Astro site
        run: |
          cd docs/astro
          npm run build:from-generated
          test -f dist/index.html
