            9327605554 \
            9678185334 \
            10125733640 \
            12054116496 \
            12104083372 \
            12137627404 \
            -o docs/source/ \
            -c 'Hikes with Perla'
          strava-collections \
            2663962144 \
            2666207046 \
            2669210977 \
            2672807915 \
            2675591839 \
            2678504583 \
            2681678397 \
            2685785353 \
            11702826079 \
            2687395619 \
            -o docs/source/ \
            -c 'Japan'
          strava-collections \
            813611974 \
            814667984 \
            815722126 \
            816416782 \
            817458392 \
            818317407 \
            818351252 \
            820642128 \
            821757676 \
            -o docs/source/ \
            -c 'Vietnam'
          strava-collections \
            1324271479 \
            1325123423 \
            1326744150 \
            1327962669 \
            1328949546 \
            1330086898 \
            1331713983 \
            1332641515 \
            1333971033 \
            1336237609 \
            -o docs/source/ \
            -c 'Taiwan'
          
          cd docs
          make clean
          make html
          cd ..
          ls docs/build/html/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload built docs
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
