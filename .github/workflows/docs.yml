            11368440756F \
            15177143911 \
            15877224330 \
            16029679520 \
            -o docs/source/ \
            -c 'Bavarian alps traverse'
          strava-collections \
            836894407 \
            838026669 \
            838748059 \
            840195182 \
            -o docs/source/ \
            -c 'Singapore to Kuala Lumpur'
          strava-collections \
            10184212131 \
            10188508424 \
