name: Deploy docs to GitHub Pages

on:
  push:
    branches: ["devel", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
  STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
  STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
  MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Restore Strava cache
        uses: actions/cache/restore@v3
        with:
          path: cache/
          key: strava-cache-v1
          restore-keys: |
            strava-cache-

      - name: Clone private Strava cache repo
        uses: actions/checkout@v4
        with:
          repository: max-models/temporary-strava-activities
          token: ${{ secrets.GITHUB_TOKEN }}
          path: temp-strava-cache

      - name: Copy cache files
        run: |
          mkdir -p cache
          ls cache/
          echo "-------------"
          cp -r temp-strava-cache/* cache/
          ls cache/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install ".[dev,docs]"

      - name: Build all collections
        uses: ./.github/actions/build-all-collections

      - name: Save Strava cache
        if: always()
        uses: actions/cache/save@v3
        with:
          path: cache/
          key: strava-cache-v1

      - name: Prepare Astro assets
        run: |
          mkdir -p docs/astro/public/_static
          cp -r docs/source/_static/* docs/astro/public/_static/
          mkdir -p docs/astro/src/content/collections
          cp docs/source/collection-*.md docs/astro/src/content/collections/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: docs/astro/package.json

      - name: Install Astro dependencies
        run: cd docs/astro && npm install

      - name: Build Astro site
        run: cd docs/astro && npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload built site
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/astro/dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
