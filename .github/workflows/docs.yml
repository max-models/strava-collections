name: Deploy docs to GitHub Pages

on:
  push:
    branches: ["devel", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
  STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
  STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
  MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
  STRAVA_CACHE_DIR: temporary-strava-activities

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout private data
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/temporary-strava-activities
          token: ${{ secrets.DATA_REPO_TOKEN }}
          path: temporary-strava-activities

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install ".[dev,docs]"

      - name: Build all collections
        uses: ./.github/actions/build-all-collections

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: "npm"
          cache-dependency-path: docs/astro/package-lock.json

      - name: Install Astro dependencies
        run: cd docs/astro && npm ci

      - name: Build Astro site
        run: cd docs/astro && npm run build:from-generated

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload built site
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/astro/dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
