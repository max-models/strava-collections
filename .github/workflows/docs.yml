name: Deploy docs to GitHub Pages

on:
  push:
    branches: ["devel", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
  STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
  STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[docs]"

      - name: Test tutorials
        run: |
          jupyter nbconvert --to notebook --execute tutorials/*.ipynb --output-dir=/tmp --ExecutePreprocessor.timeout=300

      - name: Build Sphinx docs
        run: |
          pip install ".[docs]"
          mkdir -p docs/source/_static/plots/bavarian-alps
          strava-collections \
            12284003055F \
            12231765525F \
            11603714471F \
            11487681160 \
            11492585278 \
            9020068072 \
            11518973205 \
            9327605554F \
            9586696097 \
            9961995244 \
            11166740981 \
            11378142289F \
            11368440756F \
            15177143911 \
            15877224330 \
            16029679520 \
            -o docs/source/ \
            -c 'Bavarian alps traverse'
          cd docs
          make clean
          make html
          cd ..
          ls docs/build/html/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload built docs
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
