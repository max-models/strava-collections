# Follow My Garmin — trip collections
#
# Each collection groups one or more Garmin LiveTrack activities.
# Add a new collection for each stage/day/segment of your trip.
# Paste the Garmin LiveTrack URL once the session has been started.
# Leave livetrackUrl as null (or omit it) for planned or rest stages.
# Optional: set routeGpxFile to a local GPX file path in this repository for a planned route overlay.

